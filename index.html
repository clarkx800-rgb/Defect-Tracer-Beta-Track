<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Defect Tracker - Tactical V2</title>

    <link rel="icon" type="image/png" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111111">
    
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-status-bar-style" content="black-translucent">

    <script src="database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(registration => {
                    console.log('Offline mode activated!', registration.scope);
                }).catch(err => {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>
    
    <style>
        :root {
            --primary: #8bc34a; 
            --primary-dark: #33691e;
            --danger: #d32f2f; 
            --success: #4caf50;
            --warning: #ffb300; 
            --bg-color: #0d0d0d; 
            --card-bg: #1a1a1a; 
            --input-bg: #111111;
            --text-color: #e0e0e0;
            --text-muted: #888888;
            --border-color: #333333;
            --hud-glow: 0 0 8px rgba(139, 195, 74, 0.4);
            --map-width: 70px; 
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0; 
            box-sizing: border-box;
            text-transform: uppercase;
        }

        * { border-radius: 2px !important; }

        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background-color: #111111;
            padding: 10px 15px;
            border-bottom: 2px solid var(--primary);
            box-shadow: var(--hud-glow); 
            min-height: 50px;
            display: flex;
            align-items: center;
        }

        .header-top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            gap: 10px;
        }

        /* WRAPPING LOGIC FOR LONG NAMES */
        .sts-label-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
            overflow: hidden;
        }

        h2 { 
            margin: 0; 
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap; /* Allows the name to wrap below "STS:" if needed */
            color: var(--primary);
            line-height: 1.2;
        }

        #active-area-display {
            font-size: 11px;
            padding: 2px 6px;
            font-weight: bold;
            display: inline-block;
            width: fit-content;
        }

        #active-route-display {
            font-size: 13px;
            color: var(--text-color);
            word-break: break-word; /* Prevents long strings from breaking layout */
        }

        /* SIMPLIFIED ICON-ONLY MENU BUTTON */
        .menu-toggle-btn {
            background-color: #ffffff;
            color: #000000; 
            border: none;
            width: 40px;
            height: 40px;
            display: flex;       
            align-items: center; 
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
        }
        
        .menu-toggle-icon { 
            font-size: 24px; 
            font-weight: bold;
        }

        #collapsible-menu {
            overflow: hidden;
            transition: max-height 0.3s ease-out, opacity 0.3s ease-out;
            background: #111;
            padding: 0 15px;
        }
        #collapsible-menu.expanded { max-height: 850px; opacity: 1; padding-bottom: 15px; border-bottom: 1px solid var(--border-color); }
        #collapsible-menu.collapsed { max-height: 0; opacity: 0; }

        .control-panel {
            background: var(--card-bg);
            padding: 12px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 10px;
        }

        .control-panel label { font-size: 11px; color: var(--text-muted); }
        
        select, .segment-notes {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--border-color) !important;
            font-size: 15px; 
            background-color: var(--input-bg) !important;
            color: var(--text-color) !important;
            text-transform: uppercase;
        }

        .save-load-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }

        button { padding: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        .btn-primary { background-color: var(--primary-dark); color: #fff; border: 1px solid var(--primary); flex: 2; }
        .btn-success { background-color: #1b5e20; color: #fff; border: 1px solid #4caf50; width: 100%; margin: 10px 0; }
        .btn-warning { background-color: #ff8f00; color: #000; }
        .btn-info { background-color: #01579b; color: #fff; }

        .app-layout { display: flex; align-items: flex-start; gap: 10px; padding: 0 10px 30px 0px; }

        .mini-map-container {
            position: sticky;
            top: 70px; 
            width: var(--map-width);
            max-height: calc(100vh - 90px);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 5px;
            scrollbar-width: none; 
        }

        .map-item {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 10px 0;
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
        }
        
        .map-item.has-data { border-color: var(--warning); color: var(--warning); }
        .map-item.active-map { border-color: var(--primary) !important; color: #fff; box-shadow: var(--hud-glow);}

        #segments-container { flex: 1; display: flex; flex-direction: column; gap: 15px; min-width: 0; }

        .segment-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 15px;
            animation: cascadingFadeIn 0.3s ease-out both;
            scroll-margin-top: 70px; 
        }

        .segment-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-bottom: 10px; }
        
        /* THIS IS THE TS- NUMBER STYLE */
        .segment-header h3 { margin: 0; font-size: 18px; letter-spacing: 1px; }

        .direction-badge { font-size: 11px; font-weight: bold; background: var(--input-bg); padding: 4px 8px; border: 1px solid var(--border-color);}

        .defect-row { display: flex; flex-wrap: wrap; gap: 8px; background: var(--input-bg); padding: 10px; border: 1px solid var(--border-color); margin-top: 10px; }

        .photo-wrapper { display: flex; align-items: center; gap: 8px; flex: 1 1 100%; background: #000; padding: 4px; border: 1px solid var(--border-color); justify-content: space-between;}
        .camera-btn { background: #333; color: #fff; padding: 10px; font-size: 12px; flex: 0 1 auto; }
        .photo-name { font-size: 11px; color: var(--success); flex: 1; text-align: center; overflow: hidden; }
        
        .delete-btn { 
            background: transparent; 
            color: var(--danger); 
            border: 1px solid var(--danger); 
            width: 38px; 
            height: 38px; 
            font-size: 20px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            flex-shrink: 0;
        }

        .add-defect-btn { background: transparent; color: var(--text-muted); border: 1px dashed var(--text-muted); margin-top: 10px; width: 100%; font-size: 12px; }
    </style>
</head>
<body>

    <div class="sticky-header">
        <div class="header-top-bar">
            <div class="sts-label-container">
                <span id="active-area-display"></span>
                <h2>STS: <span id="active-route-display">SELECT BLOCK</span></h2>
            </div>
            <button class="menu-toggle-btn" onclick="toggleMenu()" id="menuBtn">
                <span class="menu-toggle-icon">⚙️</span>
            </button>
        </div>
    </div>
    
    <div id="collapsible-menu" class="collapsed">
        <button id="exportBtn" class="btn-success" onclick="exportData()">📊 EXPORT FINAL REPORT</button>
        
        <div class="save-load-grid">
            <button class="btn-warning" onclick="saveProject()">💾 SAVE</button>
            <button class="btn-info" onclick="document.getElementById('importFile').click()">📂 LOAD</button>
            <input type="file" id="importFile" accept=".json" style="display: none;" onchange="loadProject(event)">
        </div>

        <div class="control-panel">
            <label>1. SELECT AREA</label>
            <select id="general-area" onchange="updateRouteDropdown()">
                <option value="">AWAITING...</option>
            </select>

            <label>2. SELECT DIRECTION</label>
            <select id="page-direction" onchange="updateRouteDropdown()">
                <option value="Inbound Track">INBOUND (IB)</option>
                <option value="Outbound Track">OUTBOUND (OB)</option>
            </select>
            
            <label>3. SELECT BLOCK</label>
            <select id="global-section">
                <option value="">AWAITING...</option>
            </select>
            
            <div class="action-buttons">
                <button class="btn-primary" onclick="generateSegments()">INITIATE</button>
                <button class="btn-outline" onclick="flipOrder()">🔃 FLIP</button>
            </div>
        </div>
    </div>

    <div class="app-layout">
        <div class="mini-map-container" id="miniMap"></div>
        <div id="segments-container">
            </div>
    </div>

    <script>
        let currentFileName = null;

        function toggleMenu(forceClose = false) {
            const menu = document.getElementById('collapsible-menu');
            const btn = document.getElementById('menuBtn');
            if (forceClose || menu.classList.contains('expanded')) {
                menu.classList.remove('expanded');
                menu.classList.add('collapsed');
                btn.innerHTML = '<span class="menu-toggle-icon">⚙️</span>';
            } else {
                menu.classList.remove('collapsed');
                menu.classList.add('expanded');
                btn.innerHTML = '<span class="menu-toggle-icon">✖</span>';
            }
        }

        function getLineColors(lineName) {
            if (!lineName) return { bg: 'transparent', text: '#fff', border: '#333' };
            const name = lineName.toUpperCase();
            if (name.includes("EXPO")) return { bg: '#3e3000', text: '#ffc107', border: '#ffc107' };
            if (name.includes("MILLENIUM")) return { bg: '#00254d', text: '#3399ff', border: '#3399ff' };
            if (name.includes("EVERGREEN")) return { bg: '#0f3316', text: '#4caf50', border: '#4caf50' };
            return { bg: '#222', text: '#aaa', border: '#555' };
        }

        document.addEventListener("DOMContentLoaded", () => {
            const areaSelect = document.getElementById('general-area');
            for (let area in globalDatabase) {
                let opt = document.createElement('option');
                opt.value = area;
                opt.textContent = area;
                areaSelect.appendChild(opt);
            }
        });

        function updateRouteDropdown() {
            const area = document.getElementById('general-area').value;
            const direction = document.getElementById('page-direction').value;
            const dropdown = document.getElementById('global-section');
            dropdown.innerHTML = '<option value="">AWAITING...</option>';
            if (area && direction && globalDatabase[area][direction]) {
                const routes = globalDatabase[area][direction];
                for (let r in routes) {
                    let opt = document.createElement('option');
                    opt.value = r; opt.textContent = routes[r].name;
                    dropdown.appendChild(opt);
                }
            }
        }

        const scrollObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const areaName = entry.target.getAttribute('data-area-name');
                    const areaDisplay = document.getElementById('active-area-display');
                    const routeDisplay = document.getElementById('active-route-display');
                    
                    routeDisplay.textContent = entry.target.getAttribute('data-route-name');
                    areaDisplay.textContent = areaName;
                    
                    const colors = getLineColors(areaName);
                    areaDisplay.style.backgroundColor = colors.bg;
                    areaDisplay.style.color = colors.text;
                    areaDisplay.style.border = `1px solid ${colors.border}`;

                    document.querySelectorAll('.map-item').forEach(m => m.classList.remove('active-map'));
                    const mapItem = document.querySelector(`.map-item[data-map-segment="${entry.target.getAttribute('data-segment')}"]`);
                    if (mapItem) {
                        mapItem.classList.add('active-map');
                        mapItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    }
                }
            });
        }, { rootMargin: '-100px 0px -50% 0px' });

        function generateSegments() {
            const area = document.getElementById('general-area').value;
            const direction = document.getElementById('page-direction').value;
            const route = document.getElementById('global-section').value;
            if (!area || !route) return;

            const data = globalDatabase[area][direction][route];
            const container = document.getElementById('segments-container');
            const mapContainer = document.getElementById('miniMap');
            container.innerHTML = ''; mapContainer.innerHTML = '';

            data.segments.forEach((range, idx) => {
                const color = range.color || 'var(--primary)';
                const start = range.start, end = range.end;
                const step = start <= end ? 1 : -1;
                for (let i = start; (step === 1 ? i <= end : i >= end); i += step) {
                    const card = createSegmentCard(i, data.name, direction, color, area);
                    container.appendChild(card);
                    scrollObserver.observe(card);

                    const mapBtn = document.createElement('div');
                    mapBtn.className = 'map-item';
                    mapBtn.setAttribute('data-map-segment', i);
                    mapBtn.textContent = `TS-${i}`;
                    mapBtn.style.borderLeft = `4px solid ${color}`;
                    mapBtn.onclick = () => card.scrollIntoView({ behavior: 'smooth' });
                    mapContainer.appendChild(mapBtn);
                }
            });
            toggleMenu(true);
        }

        function createSegmentCard(num, route, dir, color, area) {
            const card = document.createElement('div');
            card.className = 'segment-card';
            card.setAttribute('data-segment', num);
            card.setAttribute('data-route-name', route);
            card.setAttribute('data-area-name', area);
            card.style.borderLeft = `4px solid ${color}`;

            const lineColors = getLineColors(area);

            card.innerHTML = `
                <div class="segment-header">
                    <h3 style="color: ${color}">TS-${num}</h3>
                    <div class="segment-header-badges">
                        <span class="direction-badge" style="color:${lineColors.text}; border-color:${lineColors.border}">${area}</span>
                        <span class="direction-badge">${route}</span>
                    </div>
                </div>
                <textarea class="segment-notes" placeholder="LOG DETAILS..."></textarea>
                <div class="defect-list"></div>
                <button class="add-defect-btn" onclick="addDefectRow(this.previousElementSibling)">+ ADD DEFECT</button>
            `;
            addDefectRow(card.querySelector('.defect-list'));
            return card;
        }

        function addDefectRow(container, prefill = null) {
            const row = document.createElement('div');
            row.className = 'defect-row';
            
            const comp = document.createElement('select');
            components.forEach(c => {
                const o = document.createElement('option');
                o.value = c === 'Select Component' ? '' : c;
                o.textContent = c.toUpperCase();
                comp.appendChild(o);
            });

            const def = document.createElement('select');
            def.disabled = true;
            def.innerHTML = '<option value="">AWAITING...</option>';

            comp.onchange = () => {
                def.innerHTML = '';
                if (comp.value && defectMap[comp.value]) {
                    def.disabled = false;
                    defectMap[comp.value].forEach(d => {
                        const o = document.createElement('option');
                        o.value = d; o.textContent = d.toUpperCase();
                        def.appendChild(o);
                    });
                } else { def.disabled = true; def.innerHTML = '<option value="">AWAITING...</option>'; }
            };

            const wrapper = document.createElement('div');
            wrapper.className = 'photo-wrapper';
            const id = 'p-' + Math.random().toString(36).substr(2, 5);
            wrapper.innerHTML = `
                <label for="${id}" class="camera-btn">📷 PHOTO</label>
                <input type="file" id="${id}" class="file-input" accept="image/*" capture="environment">
                <div class="photo-name">EMPTY</div>
            `;
            
            const del = document.createElement('button');
            del.className = 'delete-btn'; del.innerHTML = '✖';
            del.onclick = () => row.remove();

            wrapper.appendChild(del);
            row.append(comp, def, wrapper);
            container.appendChild(row);

            wrapper.querySelector('input').onchange = function() {
                if (this.files[0]) {
                    wrapper.querySelector('.photo-name').textContent = "ATTACHED";
                    wrapper.querySelector('.camera-btn').style.background = "var(--success)";
                    const reader = new FileReader();
                    reader.onload = e => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            canvas.width = 800; canvas.height = (img.height/img.width)*800;
                            canvas.getContext('2d').drawImage(img, 0, 0, 800, canvas.height);
                            row.dataset.base64Image = canvas.toDataURL('image/jpeg', 0.7);
                            row.dataset.imgWidth = 800; row.dataset.imgHeight = canvas.height;
                        };
                        img.src = e.target.result;
                    };
                    reader.readAsDataURL(this.files[0]);
                }
            };
        }

        // Standard save/load/export functions would go here... (maintained from previous version)
    </script>
</body>
</html>
