<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Defect Tracer V2</title>

    <link rel="icon" type="image/png" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <meta id="themeColorMeta" name="theme-color" content="#1a1a1a">
    
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-status-bar-style" content="black-translucent">

    <script src="db_expo.js"></script>
    <script src="db_millennium.js"></script>
    <script src="db_evergreen.js"></script>
    <script src="themes.js"></script> 
    <script src="instructions.js"></script>
    <script src="template_config.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script>
        const APP_VERSION = "2.1.12"; // Ghost-Data Failsafe & IndexedDB Active

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log('SW fail:', err));
            });
        }
        
        function applySavedSettings() {
            const savedTheme = localStorage.getItem('appTheme') || 'tactical';
            const savedFont = localStorage.getItem('appFontSize') || 'small';
            const themeData = systemThemes[savedTheme];
            const fontData = systemFonts[savedFont];
            const root = document.documentElement;
            for (let key in themeData) root.style.setProperty(key, themeData[key]);
            for (let key in fontData) root.style.setProperty(key, fontData[key]);
            document.getElementById('themeColorMeta').setAttribute('content', themeData['--theme-color-meta']);
        }
        applySavedSettings();
    </script>
    
    <style>
        :root {
            --primary: #8bc34a; --primary-dark: #33691e; --danger: #d32f2f; --success: #4caf50; --warning: #ffb300; 
            --bg-color: #0d0d0d; --card-bg: #1a1a1a; --input-bg: #111111; --text-color: #e0e0e0; --text-muted: #888888;
            --border-color: #333333; --hud-glow: 0 0 8px rgba(139, 195, 74, 0.4); --border-radius: 2px;
            --base-font: 13px; --header-font: 16px; --map-font: 15px; --btn-font: 14px; --map-width: 80px; 
        }

        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; box-sizing: border-box; text-transform: uppercase; -webkit-font-smoothing: antialiased; transition: background-color 0.3s ease, color 0.3s ease; }
        * { border-radius: var(--border-radius) !important; }

        .sticky-header { position: sticky; top: 0; z-index: 1000; background-color: var(--card-bg); padding: 10px 15px; border-bottom: 2px solid var(--primary); box-shadow: var(--hud-glow); }
        .header-top-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: nowrap; gap: 12px; }
        .header-title-container { flex: 1; min-width: 0; position: relative; display: flex; align-items: center; flex-wrap: wrap; gap: 10px; }
        #active-area-display { font-size: var(--base-font); padding: 4px 10px; font-weight: bold; text-transform: uppercase; border: 1px solid transparent; display: inline-block; }
        .sts-header-btn { background-color: var(--input-bg); border: 1px solid var(--primary); color: var(--text-color); padding: 4px 10px; font-weight: bold; cursor: pointer; display: inline-flex; align-items: center; text-transform: uppercase; box-shadow: var(--hud-glow); }
        .sts-shortcut-menu { position: absolute; top: 100%; left: 0; background: var(--bg-color); border: 1px solid var(--primary); box-shadow: 0 10px 25px rgba(0,0,0,0.9), var(--hud-glow); z-index: 1002; padding: 5px; display: none; flex-direction: column; gap: 5px; max-height: 350px; overflow-y: auto; width: 100%; margin-top: 10px; }
        .sts-menu-item { padding: 12px; background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-color); cursor: pointer; font-size: var(--base-font); font-weight: bold; display: flex; align-items: center; }

        #collapsible-menu { overflow: hidden; transition: max-height 0.3s ease-out, opacity 0.3s ease-out; }
        #collapsible-menu.expanded { max-height: 1200px; opacity: 1; margin-top: 15px; }
        #collapsible-menu.collapsed { max-height: 0; opacity: 0; margin-top: 0; }
        
        .control-panel { background: var(--card-bg); padding: 12px; border: 1px solid var(--border-color); margin-bottom: 10px; display: flex; flex-direction: column; gap: 8px; }
        select, .segment-notes, .custom-comp, .custom-def { flex: 1; padding: 12px; border: 1px solid var(--border-color) !important; font-size: var(--base-font); background-color: var(--input-bg) !important; color: var(--text-color) !important; text-transform: uppercase; font-family: inherit; appearance: none; }
        .checkbox-list { display: flex; flex-direction: column; gap: 4px; max-height: 250px; overflow-y: auto; background: var(--input-bg); border: 1px solid var(--border-color); padding: 10px; margin-bottom: 10px; }
        
        button { padding: 12px; border: 1px solid transparent; font-size: var(--btn-font); font-weight: bold; letter-spacing: 1px; color: white; cursor: pointer; font-family: inherit; }
        .btn-success { background-color: var(--success); color: #fff; width: 100%; margin-bottom: 5px;}
        .btn-primary { background-color: var(--primary-dark); border-color: var(--primary); flex: 2; }
        .btn-danger { background-color: transparent; color: var(--danger); border-color: var(--danger); }
        .btn-outline { background-color: transparent; color: var(--primary); border: 1px solid var(--primary); flex: 1; }
        .save-load-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 5px; }

        .app-layout { display: flex; align-items: flex-start; gap: 10px; padding: 15px 15px 30px 10px; position: relative; }
        .mini-map-container { position: sticky; top: 90px; width: var(--map-width); max-height: calc(100vh - 105px); overflow-y: auto; display: flex; flex-direction: column; gap: 5px; scrollbar-width: none; }
        .map-item { background: var(--card-bg); border: 1px solid var(--border-color); padding: 10px 0; text-align: center; font-weight: bold; font-size: var(--map-font); color: var(--text-muted); cursor: pointer; user-select: none; }
        .map-item.has-data { background-color: var(--primary-dark); color: #fff; border-color: var(--primary-dark); }
        .map-item.active-map { background: var(--primary); color: #fff; border-color: var(--primary-dark) !important; box-shadow: var(--hud-glow);}

        #segments-container { flex: 1; display: flex; flex-direction: column; gap: 15px; min-width: 0; padding-bottom: 90px; }
        .segment-card { background: var(--card-bg); border: 1px solid var(--border-color); padding: 15px; position: relative; box-shadow: var(--hud-glow); animation: cascadingFadeIn 0.3s ease-out; scroll-margin-top: 150px; }
        .segment-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-bottom: 10px; }
        
        .defect-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; background: var(--input-bg); padding: 10px; border: 1px solid var(--border-color); }
        .photo-wrapper { display: flex; align-items: stretch; gap: 8px; flex: 1 1 100%; justify-content: space-between; background: var(--card-bg); padding: 5px; border: 1px solid var(--border-color); }
        .camera-btn { background-color: var(--border-color); color: var(--text-color); padding: 10px 12px; font-weight: bold; cursor: pointer; flex: 0 1 auto; display: flex; align-items: center; justify-content: center; }
        .photo-status-badge { background: var(--primary-dark); color: #fff; padding: 8px 10px; cursor: pointer; font-size: var(--base-font); font-weight: bold; flex: 1; text-align: center; border: 1px solid var(--primary); display: flex; align-items: center; justify-content: center; height: 100%; }

        .command-bar { position: fixed; bottom: 20px; left: 20px; display: flex; align-items: center; background-color: var(--card-bg); border: 2px solid var(--primary); border-radius: 28px; height: 56px; box-shadow: 0 4px 10px rgba(0,0,0,0.8), var(--hud-glow); z-index: 980; overflow: hidden; transition: width 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); width: 440px; max-width: calc(100vw - 40px); white-space: nowrap; }
        .command-bar.collapsed { width: 56px; }
        .command-btn { background: transparent; border: none; color: var(--text-color); width: 56px; height: 100%; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
        
        .quick-add-modal { position: fixed; bottom: 85px; left: 20px; width: 300px; max-width: calc(100vw - 40px); background-color: var(--bg-color); border: 1px solid var(--primary); box-shadow: 0 10px 25px rgba(0,0,0,0.9), var(--hud-glow); z-index: 985; padding: 15px; display: none; flex-direction: column; gap: 10px; }
        .system-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); z-index: 9999; display: none; align-items: center; justify-content: center; backdrop-filter: blur(3px); }
        .system-modal { background: var(--card-bg); border: 1px solid var(--primary); box-shadow: 0 0 20px rgba(0,0,0, 0.3); width: 85%; max-width: 320px; padding: 20px; text-align: center; }

        /* LOCK SCREEN WITH NON-BLOCKING UI */
        .export-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); z-index: 99999; display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .export-box { background: var(--card-bg); border: 2px solid var(--primary); padding: 30px; border-radius: 4px; width: 85%; max-width: 400px; text-align: center; box-shadow: 0 0 50px rgba(139, 195, 74, 0.3); }
        .progress-container { width: 100%; background: var(--input-bg); border: 1px solid var(--border-color); height: 32px; border-radius: 4px; overflow: hidden; position: relative; margin: 20px 0; }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; transition: width 0.1s linear; }
        .progress-text { position: absolute; width: 100%; text-align: center; top: 6px; font-weight: bold; color: #fff; text-shadow: 1px 1px 2px #000; }
        .export-status { color: var(--text-color); font-size: 14px; font-weight: bold; letter-spacing: 1px; }

        @keyframes cascadingFadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="sticky-header" id="stickyHeader">
        <div class="header-top-bar">
            <div class="header-title-container">
                <span id="active-area-display"></span>
                <button id="stsDropdownBtn" class="sts-header-btn" onclick="toggleStsMenu(event)" style="display: none;">
                    <span id="active-route-display">AWAITING...</span> 
                    <span style="font-size:10px; margin-left:6px; color:var(--primary);">▼</span>
                </button>
                <div id="stsShortcutMenu" class="sts-shortcut-menu"></div>
            </div>
            <button class="menu-toggle-btn" onclick="toggleMenu()" id="menuBtn" style="background:none; border:none; color:white; font-size:24px;">⚙</button>
        </div>
        
        <div id="collapsible-menu" class="collapsed">
            <button id="exportBtn" class="btn-success" onclick="exportData()">📊 EXPORT REPORT (Excel & PDF)</button>
            <div class="save-load-grid">
                <button class="btn-warning" onclick="saveProject()">💾 SAVE DATA</button>
                <button class="btn-info" onclick="document.getElementById('importFile').click()">📂 LOAD DATA</button>
                <input type="file" id="importFile" accept=".json" style="display:none;" onchange="loadProject(event)">
            </div>
            <div class="control-panel">
                <select id="general-area"><option value="">SELECT LINE...</option></select>
                <select id="page-direction"><option value="Inbound Track">INBOUND (IB)</option><option value="Outbound Track">OUTBOUND (OB)</option></select>
                <div class="action-buttons">
                    <button class="btn-primary" onclick="openInitialQuickAdd()">CHOOSE SECTIONS</button>
                    <button class="btn-outline" onclick="flipOrder()" style="border:1px solid var(--primary); color:var(--primary);">🔃 FLIP</button>
                </div>
            </div>
        </div>
    </div>

    <div class="app-layout">
        <div class="mini-map-container" id="miniMap"></div>
        <div id="segments-container"></div>
        <div id="empty-workspace-state" style="flex:1; display:none; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:50px;">
            <h3 style="color:var(--text-muted);">WORKSPACE EMPTY</h3>
            <p style="color:var(--text-muted); font-size:14px;">Select sections from the menu above to begin.</p>
        </div>
    </div>

    <div class="command-bar collapsed" id="mainCommandBar">
        <button class="command-btn" onclick="toggleCommandBar(event)">💊</button>
        <div style="display:flex; align-items:center; width:100%; justify-content:space-evenly;">
            <div style="display:flex; align-items:center;"><span style="color:var(--primary); font-weight:bold;">TS-</span><input type="tel" id="pillSearchInput" placeholder="####" style="width:60px; background:none; border:none; color:white; font-weight:bold;" onkeypress="if(event.key === 'Enter') searchTSFromPill()"></div>
            <button class="command-btn" onclick="toggleQuickAddModal(true)">+</button>
            <button class="command-btn" id="dynamicSaveLoadBtn">💾</button>
        </div>
    </div>

    <div class="export-overlay" id="exportProgressOverlay">
        <div class="export-box">
            <div class="export-title" id="exportMainTitle">SYSTEM BUSY</div>
            <div class="progress-container"><div class="progress-bar" id="exportProgressBar"></div><div class="progress-text" id="exportProgressText">0%</div></div>
            <div class="export-status" id="exportStatusText">INITIALIZING ENGINE...</div>
        </div>
    </div>

    <div class="quick-add-modal" id="quickAddModal">
        <h4 id="quick-add-title">ADD ROUTE</h4>
        <div id="quick-add-checklist" class="checkbox-list"></div>
        <div style="display:flex; gap:8px;"><button class="btn-primary" onclick="generateSegments()">ADD</button><button class="btn-outline" onclick="toggleQuickAddModal(false)">CANCEL</button></div>
    </div>

    <div class="quick-add-modal" id="cloneModal">
        <h4>CLONE DEFECT TO TS:</h4>
        <input type="tel" id="cloneTsInput" placeholder="TARGET TS..." style="width:100%; padding:12px; margin-bottom:10px;">
        <div style="display:flex; gap:8px;"><button class="btn-primary" onclick="executeClone()">CLONE</button><button class="btn-outline" onclick="closeCloneModal()">CANCEL</button></div>
    </div>

    <div class="system-modal-overlay" id="systemModalOverlay"><div class="system-modal"><div id="systemModalTitle" style="color:var(--warning); font-weight:bold; margin-bottom:15px;">NOTICE</div><div id="systemModalMessage" style="margin-bottom:20px;"></div><button class="btn-primary" onclick="closeSystemModal()" style="width:100%;">OK</button></div></div>
    <div class="system-modal-overlay" id="galleryModalOverlay"><div class="gallery-modal" style="background:var(--bg-color); width:90%; max-height:80vh; display:flex; flex-direction:column; border:1px solid var(--primary);"><div style="padding:15px; border-bottom:1px solid var(--border-color); display:flex; justify-content:space-between;"><h3>PHOTOS</h3><button onclick="closeGallery()" style="background:none; border:none; color:white; font-size:20px;">✖</button></div><div id="galleryGrid" style="flex:1; overflow-y:auto; padding:15px; display:grid; gap:15px;"></div></div></div>

    <script>
        let currentFileName = null, loadedRoutes = new Set(), routeLoadHistory = [], currentActiveArea = "", currentActiveDirection = "";
        let isAutoScrolling = false, currentRowForGallery = null, currentRowToClone = null;

        const delay = ms => new Promise(res => setTimeout(res, ms));

        // ==========================================
        // INDEXED-DB ENGINE (Memory Hardened)
        // ==========================================
        const initDB = () => new Promise((res, rej) => {
            const req = indexedDB.open("TracerImageDB", 1);
            req.onupgradeneeded = e => e.target.result.createObjectStore('images', {keyPath:'id'});
            req.onsuccess = e => { window.imageDB = e.target.result; res(window.imageDB); };
            req.onerror = rej;
        });
        initDB().catch(console.error);

        const saveImageToDB = (data, w, h) => new Promise((res, rej) => {
            const id = 'img_' + Date.now() + Math.random().toString(36).substr(2,5);
            const tx = window.imageDB.transaction(['images'], 'readwrite');
            tx.objectStore('images').add({id, data, w, h});
            tx.oncomplete = () => res({id, w, h});
            tx.onerror = rej;
        });

        const getImageFromDB = id => new Promise(res => {
            const tx = window.imageDB.transaction(['images'], 'readonly');
            const req = tx.objectStore('images').get(id);
            req.onsuccess = e => res(e.target.result);
            req.onerror = () => res(null);
        });

        const deleteImageFromDB = id => {
            const tx = window.imageDB.transaction(['images'], 'readwrite');
            tx.objectStore('images').delete(id);
        };

        // ==========================================
        // UI PROGRESS & NON-BLOCKING CORE
        // ==========================================
        async function updateProgress(percent, text, title = "SYSTEM PROCESSING") {
            const overlay = document.getElementById('exportProgressOverlay');
            overlay.style.display = 'flex';
            document.getElementById('exportMainTitle').textContent = title;
            document.getElementById('exportProgressBar').style.width = percent + '%';
            document.getElementById('exportProgressText').textContent = percent + '%';
            document.getElementById('exportStatusText').textContent = text;
            await delay(16); // UI BREATHING FRAME
        }

        function closeProgress() { document.getElementById('exportProgressOverlay').style.display = 'none'; }

        // ==========================================
        // EXPORT ENGINE (GHOST-DATA SAFE)
        // ==========================================
        async function exportData() {
            const cards = document.querySelectorAll('.segment-card');
            if (!cards.length) return;
            
            try {
                await updateProgress(5, "INITIALIZING EXCEL...", "EXPORTING DATA");
                const workbook = new ExcelJS.Workbook();
                const ws = workbook.addWorksheet('Defects');
                ws.columns = [
                    {header:'Area',key:'area',width:15},{header:'Route',key:'route',width:20},
                    {header:'TS',key:'ts',width:10},{header:'Notes',key:'notes',width:30},
                    {header:'Component',key:'comp',width:20},{header:'Defect',key:'def',width:20}
                ];
                
                let pdfJobs = [], hasData = false, total = cards.length;

                for(let i=0; i<total; i++) {
                    const card = cards[i];
                    const ts = `TS-${card.dataset.segment}`;
                    const notes = card.querySelector('.segment-notes').value;
                    const rows = card.querySelectorAll('.defect-row');
                    
                    await updateProgress(5 + Math.round((i/total)*25), `SCRAPING TS-${card.dataset.segment}...`);

                    rows.forEach(row => {
                        const isC = row.dataset.isCustom === "true";
                        const comp = isC ? row.querySelector('.custom-comp').value : row.querySelector('.component-select').value;
                        const def = isC ? row.querySelector('.custom-def').value : row.querySelector('.defect-select').value;
                        const refs = JSON.parse(row.dataset.images || "[]");
                        
                        if(comp || def || refs.length > 0) {
                            hasData = true;
                            ws.addRow({area:card.dataset.areaName, route:card.dataset.routeName, ts, notes, comp, def});
                            if(refs.length > 0) pdfJobs.push({ts, area:card.dataset.areaName, route:card.dataset.routeName, comp, def, refs, notes});
                        }
                    });
                    if (i % 5 === 0) await delay(16); 
                }

                if(!hasData) { closeProgress(); showSystemAlert("No data found to export."); return; }

                await updateProgress(35, "GENERATING EXCEL BLOB...", "EXPORTING DATA");
                const buffer = await workbook.xlsx.writeBuffer();
                triggerDownload(new Blob([buffer]), `REPORT_${Date.now()}.xlsx`);

                if(pdfJobs.length > 0) {
                    for(let j=0; j<pdfJobs.length; j++) {
                        const job = pdfJobs[j];
                        await updateProgress(40 + Math.round((j/pdfJobs.length)*55), `BUILDING PDF ${j+1}/${pdfJobs.length}: ${job.ts}...`);
                        
                        const imgs = [];
                        for(let r of job.refs) { 
                            if (r.id) {
                                // Modern DB Fetch
                                const d = await getImageFromDB(r.id); 
                                if(d && d.data) imgs.push(d); 
                            } else if (r.img) {
                                // Ghost-Data Legacy Support
                                imgs.push({ data: r.img, w: r.w || 1200, h: r.h || 1200 });
                            }
                        }
                        
                        if (imgs.length === 0) {
                            console.warn(`No valid images found for ${job.ts}. Skipping PDF.`);
                            continue;
                        }
                        
                        const doc = await generatePDFBlob(job, imgs);
                        const safeComp = (job.comp || 'UNKNOWN').toString().replace(/\W/g,'_');
                        triggerDownload(doc, `${job.ts}_${safeComp}.pdf`);
                        await delay(300); 
                    }
                }

                await updateProgress(100, "EXPORT COMPLETE!", "SYSTEM READY");
                setTimeout(closeProgress, 1000);

            } catch (error) {
                console.error("Export Crash:", error);
                closeProgress();
                showSystemAlert("Export failed: " + error.message, "CRITICAL ERROR", true);
            }
        }

        async function generatePDFBlob(job, imgs) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({orientation: imgs[0].w > imgs[0].h ? 'l' : 'p', unit:'mm', format:'a4'});
            
            for(let i=0; i<imgs.length; i++) {
                if(i > 0) doc.addPage('a4', imgs[i].w > imgs[i].h ? 'l' : 'p');
                const pW = doc.internal.pageSize.getWidth(), pH = doc.internal.pageSize.getHeight();
                const r = imgs[i].w / imgs[i].h, pr = (pW-20)/(pH-40);
                let w, h;
                if(r > pr) { w = pW-20; h = w/r; } else { h = pH-40; w = h*r; }
                
                doc.addImage(imgs[i].data, 'JPEG', (pW-w)/2, 10, w, h);
                
                const safeComp = job.comp || 'N/A';
                const safeDef = job.def || 'N/A';
                const safeRoute = job.route || 'UNKNOWN ROUTE';
                const safeArea = job.area || '';
                
                doc.setFontSize(12); doc.text(`${job.ts} | ${safeComp} - ${safeDef}`, 10, pH-15);
                doc.setFontSize(10); doc.text(`Loc: ${safeRoute} | ${safeArea}`, 10, pH-10);
                
                if (i % 2 === 0) await delay(16); 
            }
            return doc.output('blob');
        }

        function triggerDownload(blob, name) { const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = name; a.click(); }

        // ==========================================
        // FEATURE: GRANULAR CLONING
        // ==========================================
        async function executeClone() {
            if (!currentRowToClone) return;
            const targetTS = document.getElementById('cloneTsInput').value.trim();
            if (!targetTS) { closeCloneModal(); return; }

            const startCard = currentRowToClone.closest('.segment-card');
            const endCard = document.querySelector(`.segment-card[data-segment="${targetTS}"]`);
            if (!endCard) { showSystemAlert(`TS-${targetTS} not found.`); return; }

            closeCloneModal();
            await updateProgress(10, "INITIALIZING CLONE...", "CLONING DEFECT");

            const isCustom = currentRowToClone.dataset.isCustom === "true";
            const comp = isCustom ? currentRowToClone.querySelector('.custom-comp').value : currentRowToClone.querySelector('.component-select').value;
            const def = isCustom ? currentRowToClone.querySelector('.custom-def').value : currentRowToClone.querySelector('.defect-select').value;
            const originalRefs = JSON.parse(currentRowToClone.dataset.images || "[]");

            const allCards = Array.from(document.querySelectorAll('.segment-card'));
            const sIdx = allCards.indexOf(startCard);
            const eIdx = allCards.indexOf(endCard);
            const min = Math.min(sIdx, eIdx);
            const max = Math.max(sIdx, eIdx);
            
            let count = 0, total = (max - min);

            for (let i = min; i <= max; i++) {
                if (i === sIdx) continue;
                const target = allCards[i];
                const area = target.dataset.areaName;
                const list = target.querySelector('.defect-list');
                
                await updateProgress(10 + Math.round((count/total)*80), `CLONING TO TS-${target.dataset.segment}...`);

                const newRefs = [];
                for(let ref of originalRefs) {
                    if (ref.id) {
                        const dbImg = await getImageFromDB(ref.id);
                        if(dbImg) {
                            const newRef = await saveImageToDB(dbImg.data, dbImg.w, dbImg.h);
                            newRefs.push(newRef);
                        }
                    } else if (ref.img) {
                        // Support cloning ghost data by converting it into the new DB
                        const newRef = await saveImageToDB(ref.img, ref.w || 1200, ref.h || 1200);
                        newRefs.push(newRef);
                    }
                }
                addDefectRow(list, { isCustom, comp, def, images: newRefs }, area);
                checkSegmentData(target);
                count++;
            }

            await updateProgress(100, "CLONE COMPLETE!");
            setTimeout(closeProgress, 800);
        }

        // ==========================================
        // DYNAMIC UI COMPONENT FACTORY
        // ==========================================
        function createSegmentCard(num, key, text, dir, color, area) {
            const card = document.createElement('div');
            card.className = 'segment-card'; card.dataset.segment = num; card.dataset.routeName = text; card.dataset.areaName = area;
            card.innerHTML = `<div class="segment-header"><h3>TS-${num}</h3><div><span style="font-size:10px; opacity:0.6; margin-right:5px;">${area}</span><span style="background:var(--primary-dark); padding:2px 6px; font-size:10px;">${text}</span></div></div><textarea class="segment-notes" placeholder="NOTES..."></textarea><div class="defect-list"></div><button class="add-defect-btn" style="width:100%; margin-top:10px; background:none; border:1px dashed var(--text-muted); color:var(--text-muted);" onclick="addDefectRow(this.previousElementSibling, null, '${area}')">+ ROW</button>`;
            addDefectRow(card.querySelector('.defect-list'), null, area);
            return card;
        }

        function addDefectRow(container, prefill, area) {
            const row = document.createElement('div'); row.className = 'defect-row'; row.dataset.images = "[]"; row.dataset.isCustom = "false";
            const map = (window.globalDefectMaps && window.globalDefectMaps[area]) || {};
            
            const compSel = document.createElement('select'); compSel.className = 'component-select';
            ['SELECT COMP', ...Object.keys(map), 'CUSTOM ENTRY...'].forEach(v => { const o = document.createElement('option'); o.value = v==='SELECT COMP'?'':v; o.textContent = v; compSel.appendChild(o); });
            
            const defSel = document.createElement('select'); defSel.className = 'defect-select'; defSel.disabled = true;
            const customComp = document.createElement('input'); customComp.className='custom-comp'; customComp.placeholder='COMP...'; customComp.style.display='none';
            const customDef = document.createElement('input'); customDef.className='custom-def'; customDef.placeholder='DEFECT...'; customDef.style.display='none';
            
            const revertBtn = document.createElement('button'); revertBtn.textContent='↺'; revertBtn.style.cssText='display:none; background:none; color:var(--warning); border:1px solid var(--warning); width:40px;';
            
            const photoWrap = document.createElement('div'); photoWrap.className = 'photo-wrapper';
            const cam = document.createElement('label'); cam.className = 'camera-btn'; cam.textContent = '📷';
            const file = document.createElement('input'); file.type = 'file'; file.accept = 'image/*'; file.capture = 'environment'; file.style.display = 'none';
            const fid = 'f-'+Math.random(); cam.htmlFor = fid; file.id = fid;
            
            const badge = document.createElement('div'); badge.className = 'status-badge-container';
            const clone = document.createElement('button'); clone.textContent='⇊'; clone.style.cssText='background:none; border:1px solid #0A84FF; color:#0A84FF; width:40px;';
            const del = document.createElement('button'); del.className='delete-btn'; del.textContent='✖'; del.style.cssText='background:none; border:1px solid var(--danger); color:var(--danger); width:40px;';

            revertBtn.onclick = () => { row.dataset.isCustom="false"; compSel.style.display=''; defSel.style.display=''; customComp.style.display='none'; customDef.style.display='none'; revertBtn.style.display='none'; compSel.value=''; };
            del.onclick = () => { 
                JSON.parse(row.dataset.images || "[]").forEach(r => { if(r.id) deleteImageFromDB(r.id); }); 
                row.remove(); 
                checkSegmentData(container.closest('.segment-card')); 
            };
            clone.onclick = () => openCloneModal(row);

            file.onchange = async () => {
                if(!file.files[0]) return;
                cam.textContent = '⏳';
                const r = new FileReader();
                r.onload = e => {
                    const img = new Image();
                    img.onload = async () => {
                        const cvs = document.createElement('canvas');
                        const M = 1200; let w=img.width, h=img.height;
                        if(w>h) { if(w>M){h*=M/w; w=M;}} else {if(h>M){w*=M/h; h=M;}}
                        cvs.width=w; cvs.height=h;
                        const ctx=cvs.getContext('2d'); ctx.fillStyle="#fff"; ctx.fillRect(0,0,w,h); ctx.drawImage(img,0,0,w,h);
                        const ref = await saveImageToDB(cvs.toDataURL('image/jpeg', 0.85), w, h);
                        const refs = JSON.parse(row.dataset.images || "[]"); refs.push(ref); row.dataset.images=JSON.stringify(refs);
                        updatePhotoUI(row, cam, badge); checkSegmentData(container.closest('.segment-card'));
                    };
                    img.src = e.target.result;
                };
                r.readAsDataURL(file.files[0]);
            };

            compSel.onchange = () => {
                if(compSel.value==='CUSTOM ENTRY...') { row.dataset.isCustom="true"; compSel.style.display='none'; defSel.style.display='none'; customComp.style.display=''; customDef.style.display=''; revertBtn.style.display=''; }
                else {
                    defSel.innerHTML=''; defSel.disabled = !compSel.value;
                    if(map[compSel.value]) map[compSel.value].forEach(d => { const o=document.createElement('option'); o.value=d; o.textContent=d; defSel.appendChild(o); });
                }
                checkSegmentData(container.closest('.segment-card'));
            };

            photoWrap.append(cam, file, badge, clone, del);
            row.append(compSel, defSel, customComp, customDef, revertBtn, photoWrap);
            container.appendChild(row);

            if(prefill) {
                if(prefill.isCustom) { compSel.value='CUSTOM ENTRY...'; compSel.onchange(); customComp.value=prefill.comp; customDef.value=prefill.def; }
                else if(prefill.comp) { compSel.value=prefill.comp; compSel.onchange(); defSel.value=prefill.def; }
                if(prefill.images) { row.dataset.images=JSON.stringify(prefill.images); updatePhotoUI(row, cam, badge); }
            }
        }

        function updatePhotoUI(row, cam, badge) {
            const refs = JSON.parse(row.dataset.images || "[]");
            cam.textContent = refs.length ? '➕' : '📷';
            badge.innerHTML = refs.length ? `<div class="photo-status-badge" onclick="openGallery(this.closest('.defect-row'))">${refs.length} VIEW</div>` : '';
        }

        // ==========================================
        // SYSTEM CONTROLS & EVENT BUS
        // ==========================================
        function toggleMenu() { document.getElementById('collapsible-menu').classList.toggle('expanded'); }
        function toggleCommandBar() { document.getElementById('mainCommandBar').classList.toggle('collapsed'); }
        function openCloneModal(row) { currentRowToClone = row; document.getElementById('cloneTsInput').value=''; document.getElementById('cloneModal').style.display='flex'; }
        function closeCloneModal() { document.getElementById('cloneModal').style.display='none'; }
        function showSystemAlert(m, t="NOTICE", isDanger=false) { 
            document.getElementById('systemModalMessage').textContent=m; 
            document.getElementById('systemModalTitle').textContent=t;
            document.getElementById('systemModalTitle').style.color=isDanger?'var(--danger)':'var(--warning)';
            document.getElementById('systemModalOverlay').style.display='flex'; 
        }
        function closeSystemModal() { document.getElementById('systemModalOverlay').style.display='none'; }

        async function openGallery(row) {
            const grid = document.getElementById('galleryGrid'); grid.innerHTML='⏳ LOADING...';
            document.getElementById('galleryModalOverlay').style.display='flex';
            const refs = JSON.parse(row.dataset.images || "[]");
            grid.innerHTML='';
            for(let r of refs) {
                let imgData = null;
                if (r.id) { const d = await getImageFromDB(r.id); if(d) imgData = d.data; }
                else if (r.img) { imgData = r.img; } // Fallback for ghost data
                
                if(imgData) {
                    const item = document.createElement('div'); item.style.position='relative';
                    const i = document.createElement('img'); i.src=imgData; i.style.width='100%';
                    const b = document.createElement('button'); b.textContent='REMOVE'; b.style.cssText='position:absolute; top:5px; right:5px; background:red; color:white; border:none; padding:5px;';
                    b.onclick = () => { 
                        if(r.id) deleteImageFromDB(r.id); 
                        const newRefs = JSON.parse(row.dataset.images).filter(ref => ref.id !== r.id && ref.img !== r.img);
                        row.dataset.images = JSON.stringify(newRefs);
                        updatePhotoUI(row, row.querySelector('.camera-btn'), row.querySelector('.status-badge-container'));
                        item.remove(); 
                    };
                    item.append(i, b); grid.append(item);
                }
            }
        }
        function closeGallery() { document.getElementById('galleryModalOverlay').style.display='none'; }

        function checkSegmentData(card) {
            const notes = card.querySelector('.segment-notes').value.trim();
            let hasRows = false;
            card.querySelectorAll('.defect-row').forEach(r => { 
                const isC = r.dataset.isCustom==="true";
                const c = isC ? r.querySelector('.custom-comp').value : r.querySelector('.component-select').value;
                if(c || JSON.parse(r.dataset.images || "[]").length) hasRows = true;
            });
            const mapItem = document.querySelector(`.map-item[data-segment="${card.dataset.segment}"]`);
            if(mapItem) mapItem.classList.toggle('has-data', !!(notes || hasRows));
        }

        async function generateSegments() {
            const area = document.getElementById('general-area').value;
            const dir = document.getElementById('page-direction').value;
            const cbs = Array.from(document.querySelectorAll('#quick-add-checklist input:checked'));
            if(!cbs.length) return;

            await updateProgress(10, "BUILDING WORKSPACE...", "LOADING TRACK");
            const container = document.getElementById('segments-container');
            const map = document.getElementById('miniMap');
            
            for(let cb of cbs) {
                const route = window.globalDatabase[area][dir][cb.value];
                if(loadedRoutes.has(cb.value)) continue;
                
                route.segments.forEach(range => {
                    const step = range.start <= range.end ? 1 : -1;
                    for(let i=range.start; (step===1?i<=range.end:i>=range.end); i+=step) {
                        const card = createSegmentCard(i, cb.value, route.name, dir, range.color, area);
                        container.appendChild(card);
                        const mi = document.createElement('div'); mi.className='map-item'; mi.textContent=`TS-${i}`; mi.dataset.segment=i;
                        mi.style.borderLeft = `4px solid ${range.color || '#ccc'}`;
                        mi.onclick = () => card.scrollIntoView({behavior:'smooth', block:'center'});
                        map.appendChild(mi);
                    }
                });
                loadedRoutes.add(cb.value);
            }
            document.getElementById('empty-workspace-state').style.display='none';
            toggleMenu(); document.getElementById('quickAddModal').style.display='none';
            closeProgress();
        }

        function openInitialQuickAdd() {
            const area = document.getElementById('general-area').value;
            const dir = document.getElementById('page-direction').value;
            if(!area) return;
            const list = document.getElementById('quick-add-checklist'); list.innerHTML='';
            Object.keys(window.globalDatabase[area][dir]).forEach(k => {
                const l = document.createElement('label'); l.style.display='block';
                l.innerHTML = `<input type="checkbox" value="${k}"> ${window.globalDatabase[area][dir][k].name}`;
                list.appendChild(l);
            });
            document.getElementById('quickAddModal').style.display='flex';
        }

        function toggleQuickAddModal(s) { document.getElementById('quickAddModal').style.display = s ? 'flex' : 'none'; }

        function searchTSFromPill() {
            const val = document.getElementById('pillSearchInput').value;
            const card = document.querySelector(`.segment-card[data-segment="${val}"]`);
            if(card) card.scrollIntoView({behavior:'smooth', block:'center'});
            toggleCommandBar();
        }

        async function saveProject() {
            const cards = document.querySelectorAll('.segment-card');
            await updateProgress(10, "PACKAGING DATA...", "SAVING DATA");
            const out = [];
            for(let c of cards) {
                const obj = { segmentNum: c.dataset.segment, routeName: c.dataset.routeName, areaName: c.dataset.areaName, notes: c.querySelector('.segment-notes').value, defects: [] };
                const rows = c.querySelectorAll('.defect-row');
                for(let r of rows) {
                    const isC = r.dataset.isCustom==="true";
                    const refs = JSON.parse(r.dataset.images || "[]");
                    const imgs = [];
                    for(let ref of refs) { 
                        if(ref.id) {
                            const d = await getImageFromDB(ref.id); 
                            if(d) imgs.push(d); 
                        } else if(ref.img) {
                            imgs.push(ref); // Ghost Data
                        }
                    }
                    obj.defects.push({ isCustom:isC, comp: isC?r.querySelector('.custom-comp').value:r.querySelector('.component-select').value, def: isC?r.querySelector('.custom-def').value:r.querySelector('.defect-select').value, images: imgs });
                }
                out.push(obj);
            }
            triggerDownload(new Blob([JSON.stringify(out, null, 2)], {type:'application/json'}), `BACKUP_${Date.now()}.json`);
            closeProgress();
        }

        async function loadProject(e) {
            const file = e.target.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = async event => {
                const data = JSON.parse(event.target.result);
                await updateProgress(10, "PURGING WORKSPACE...", "LOADING DATA");
                document.getElementById('segments-container').innerHTML='';
                document.getElementById('miniMap').innerHTML='';
                loadedRoutes.clear();
                
                for(let i=0; i<data.length; i++) {
                    const seg = data[i];
                    await updateProgress(10 + Math.round((i/data.length)*80), `RESTORING TS-${seg.segmentNum}...`);
                    const card = createSegmentCard(seg.segmentNum, "", seg.routeName, "", "var(--primary)", seg.areaName);
                    card.querySelector('.segment-notes').value = seg.notes || '';
                    const list = card.querySelector('.defect-list'); list.innerHTML='';
                    for(let def of seg.defects) {
                        const newRefs = [];
                        for(let img of def.images) { 
                            if(img.data) {
                                const ref = await saveImageToDB(img.data, img.w || 1200, img.h || 1200); 
                                newRefs.push(ref); 
                            } else if (img.img) { // Ghost Data Import
                                const ref = await saveImageToDB(img.img, img.w || 1200, img.h || 1200); 
                                newRefs.push(ref); 
                            }
                        }
                        addDefectRow(list, { ...def, images: newRefs }, seg.areaName);
                    }
                    document.getElementById('segments-container').appendChild(card);
                    const mi = document.createElement('div'); mi.className='map-item'; mi.textContent=`TS-${seg.segmentNum}`; mi.dataset.segment=seg.segmentNum;
                    mi.onclick = () => card.scrollIntoView({behavior:'smooth', block:'center'});
                    document.getElementById('miniMap').appendChild(mi);
                    checkSegmentData(card);
                }
                document.getElementById('empty-workspace-state').style.display='none';
                closeProgress();
            };
            reader.readAsText(file);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const sel = document.getElementById('general-area');
            if(window.globalDatabase) Object.keys(window.globalDatabase).forEach(k => { const o=document.createElement('option'); o.value=k; o.textContent=k; sel.appendChild(o); });
            applySavedSettings();
        });
    </script>
